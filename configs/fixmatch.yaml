data:
  img_dir: /root/autodl-tmp/Glas/Image
  lbl_dir: /root/autodl-tmp/Glas/Label
  img_size: 512
  n_labeled: 40
  labeled_batch_size: 4
  unlabeled_batch_size: 4
  num_workers: 4

model:
  type: unet
  in_channels: 3
  out_channels: 1
  features: [64, 128, 256, 512]

train:
  epochs: 100
  lr: 0.0001
  threshold: 0.95
  lambda_u: 1.0
  save_dir: results/fixmatch
